<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Issue Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f111a;
            --surface-color: rgba(30, 35, 50, 0.65);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.12), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.12), transparent 40%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            padding: 1.5rem 3rem;
            background: rgba(15, 17, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        /* --- Main Layout --- */
        main {
            padding: 2rem 3rem;
            flex: 1;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        .column {
            background: var(--surface-color);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 60vh;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .badge-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* --- Issue Cards --- */
        .issue-card {
            background: rgba(20, 25, 40, 0.8);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s ease;
            position: relative;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .issue-card:hover {
            border-color: rgba(96, 165, 250, 0.5);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .issue-title {
            margin: 0 0 0.5rem 0;
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
        }

        .issue-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0 0 1rem 0;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .issue-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .priority-badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .priority-low { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .priority-medium { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .priority-high { background: rgba(239, 68, 68, 0.15); color: #f87171; }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            color: var(--text-muted);
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .icon-btn.delete:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: #151822;
            border: 1px solid var(--border-light);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h2 { margin: 0 0 1.5rem 0; font-weight: 600; }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-light);
            color: #fff;
            padding: 0.75rem;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(0, 0, 0, 0.4);
        }

        textarea.form-control { resize: vertical; min-height: 100px; }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-light);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m9 12 2 2 4-4"></path></svg>
            TrackerPro
        </div>
        <button class="btn-primary" onclick="openModal()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New Issue
        </button>
    </header>

    <main>
        <div class="board">
            <!-- Open Column -->
            <div class="column" id="col-Open">
                <div class="column-header">
                    <span style="color: #60a5fa;">Open</span>
                    <span class="badge-count" id="count-Open">0</span>
                </div>
                <div class="issue-list" id="list-Open"></div>
            </div>

            <!-- In Progress Column -->
            <div class="column" id="col-In Progress">
                <div class="column-header">
                    <span style="color: #f59e0b;">In Progress</span>
                    <span class="badge-count" id="count-In Progress">0</span>
                </div>
                <div class="issue-list" id="list-In Progress"></div>
            </div>

            <!-- Resolved Column -->
            <div class="column" id="col-Resolved">
                <div class="column-header">
                    <span style="color: #10b981;">Resolved</span>
                    <span class="badge-count" id="count-Resolved">0</span>
                </div>
                <div class="issue-list" id="list-Resolved"></div>
            </div>
        </div>
    </main>

    <!-- Modal for New/Edit Issue -->
    <div class="modal-overlay" id="issueModal">
        <div class="modal">
            <h2 id="modalTitle">Create New Issue</h2>
            <form id="issueForm" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="issueId">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="issueTitle" class="form-control" required placeholder="What needs to be fixed?">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="issueDesc" class="form-control" placeholder="Provide more details..."></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Status</label>
                        <select id="issueStatus" class="form-control">
                            <option value="Open">Open</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Resolved">Resolved</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Priority</label>
                        <select id="issuePriority" class="form-control">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Issue</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/issues';

        // Load issues on start
        document.addEventListener('DOMContentLoaded', fetchIssues);

        async function fetchIssues() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const issues = await response.json();
                renderIssues(issues);
            } catch (error) {
                console.error('Error fetching issues:', error);
                // Optionally show a toast notification here
            }
        }

        function renderIssues(issues) {
            // Clear current lists
            document.getElementById('list-Open').innerHTML = '';
            document.getElementById('list-In Progress').innerHTML = '';
            document.getElementById('list-Resolved').innerHTML = '';

            let counts = { 'Open': 0, 'In Progress': 0, 'Resolved': 0 };

            issues.forEach(issue => {
                const status = issue.status || 'Open';
                counts[status]++;
                
                const card = document.createElement('div');
                card.className = 'issue-card';
                card.innerHTML = `
                    <h3 class="issue-title">${escapeHTML(issue.title)}</h3>
                    <p class="issue-desc">${escapeHTML(issue.description || 'No description provided.')}</p>
                    <div class="issue-meta">
                        <span class="priority-badge priority-${issue.priority.toLowerCase()}">${issue.priority}</span>
                        <div class="card-actions">
                            ${status !== 'Resolved' ? `
                            <button class="icon-btn" onclick="updateStatus(${issue.id}, '${status === 'Open' ? 'In Progress' : 'Resolved'}')" title="Move to next status">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                            </button>
                            ` : ''}
                            <button class="icon-btn" onclick="editIssue(${issue.id})" title="Edit">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                            </button>
                            <button class="icon-btn delete" onclick="deleteIssue(${issue.id})" title="Delete">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
                
                // Append to appropriate column
                const container = document.getElementById(`list-${status}`);
                if (container) container.appendChild(card);
            });

            // Update counts
            document.getElementById('count-Open').innerText = counts['Open'];
            document.getElementById('count-In Progress').innerText = counts['In Progress'];
            document.getElementById('count-Resolved').innerText = counts['Resolved'];
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const id = document.getElementById('issueId').value;
            const payload = {
                title: document.getElementById('issueTitle').value,
                description: document.getElementById('issueDesc').value,
                status: document.getElementById('issueStatus').value,
                priority: document.getElementById('issuePriority').value,
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    closeModal();
                    fetchIssues();
                }
            } catch (error) {
                console.error('Error saving issue:', error);
            }
        }

        async function updateStatus(id, newStatus) {
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                fetchIssues();
            } catch (error) {
                console.error('Error updating status:', error);
            }
        }

        async function deleteIssue(id) {
            if(!confirm('Are you sure you want to delete this issue?')) return;
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchIssues();
            } catch (error) {
                console.error('Error deleting issue:', error);
            }
        }

        // Modal Logic
        function openModal() {
            document.getElementById('issueForm').reset();
            document.getElementById('issueId').value = '';
            document.getElementById('modalTitle').innerText = 'Create New Issue';
            document.getElementById('issueModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('issueModal').classList.remove('active');
        }

        async function editIssue(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`);
                const issue = await response.json();
                
                document.getElementById('issueId').value = issue.id;
                document.getElementById('issueTitle').value = issue.title;
                document.getElementById('issueDesc').value = issue.description || '';
                document.getElementById('issueStatus').value = issue.status;
                document.getElementById('issuePriority').value = issue.priority;
                
                document.getElementById('modalTitle').innerText = 'Edit Issue';
                document.getElementById('issueModal').classList.add('active');
            } catch (error) {
                console.error('Error fetching issue for edit:', error);
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }
    </script>
</body>
</html>
